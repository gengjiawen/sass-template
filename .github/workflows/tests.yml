name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CI: true
  HUSKY: 0
  DATABASE_URL: file:../../local.db
  BETTER_AUTH_SECRET: ci-secret-at-least-32-characters-long
  BETTER_AUTH_URL: http://127.0.0.1:3000
  ADMIN_CREDENTIALS: admin@example.com:password123
  GITHUB_MIRROR_DOWNLOAD_DIR: /tmp/github-mirror

jobs:
  test:
    name: macOS test suite
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Verify pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Lint and format
        run: pnpm run check

      - name: Verify formatting did not change files
        run: git diff --exit-code

      - name: Run unit tests
        run: pnpm run test

      - name: Run Playwright smoke tests
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
